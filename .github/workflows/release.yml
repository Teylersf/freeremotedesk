name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-agent:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build agent frontend
        working-directory: agent
        run: pnpm build

      - name: Build Tauri bundle
        working-directory: agent
        run: pnpm exec tauri build --target ${{ matrix.target }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            agent/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            agent/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            agent/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            agent/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
