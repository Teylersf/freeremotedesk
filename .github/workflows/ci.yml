name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  cargo-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent/src-tauri -> target
      - run: cargo check --manifest-path agent/src-tauri/Cargo.toml

  signaling-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start wrangler dev
        working-directory: signaling
        run: |
          pnpm dev &
          echo $! > wrangler.pid
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8787/health >/dev/null; then break; fi
            sleep 1
          done
      - name: Run smoke test
        working-directory: signaling
        run: node scripts/smoke.mjs
      - name: Stop wrangler
        if: always()
        working-directory: signaling
        run: kill $(cat wrangler.pid) || true
